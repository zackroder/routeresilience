app = "routeresilience"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"
  PERSISTENT_DATA_DIR = "/app/persistent_data"
  TZ = "America/Chicago"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  grace_period = "10m"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[mounts]]
  source = "gtfs_data"
  destination = "/app/persistent_data"
  initial_size = "3gb"
